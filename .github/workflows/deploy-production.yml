name: Deploy Production

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify Docker build
        run: docker build --platform linux/amd64 -t nestjs-ecommerce:ci .

      - name: Trigger Render deploy hook
        if: success()
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set; relying on Render auto-deploy."
            exit 0
          fi

          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Send Telegram success message
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Deploy completed.

            Actor: ${{ github.actor }}
            Commit: ${{ github.sha }}
            Commit message: ${{ github.event.head_commit.message }}
            Repository: ${{ github.repository }}

            Changes: https://github.com/${{ github.repository }}/commit/${{ github.sha }}

      - name: Send Telegram failure message
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Deploy failed.

            Actor: ${{ github.actor }}
            Commit: ${{ github.sha }}
            Commit message: ${{ github.event.head_commit.message }}
            Repository: ${{ github.repository }}

            Changes: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
